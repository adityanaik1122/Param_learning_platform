version: '3.8'

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: neuralpath-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrongPassword123!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - neuralpath-network
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrongPassword123! -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neuralpath-backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=True
      - DB_NAME=neuralpath_db
      - DB_USER=sa
      - DB_PASSWORD=YourStrongPassword123!
      - DB_HOST=sqlserver
      - DB_PORT=1433
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - neuralpath-network

  # FastAPI Compiler Service
  compiler:
    build:
      context: ./compiler
      dockerfile: Dockerfile
    container_name: neuralpath-compiler
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./compiler:/app
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8001:8001"
    networks:
      - neuralpath-network
    privileged: true

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neuralpath-frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
      - VITE_COMPILER_URL=http://localhost:8001
    depends_on:
      - backend
      - compiler
    networks:
      - neuralpath-network

volumes:
  sqlserver_data:

networks:
  neuralpath-network:
    driver: bridge
